name: Get-ARM64-Docker-Images-Release

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称，多个用英文逗号分开'
        required: true
        default: 'alpine:latest,alpine/curl,busybox:stable-glibc'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04
    # 授予写入 Release 的权限
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 关键步骤 1：设置 QEMU 以支持多架构镜像处理
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 关键步骤 2：拉取、校验并打包镜像
      - name: Pull Docker Images and Package
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          
          for image in "${image_array[@]}"; do
            echo "--- Processing: $image ---"
            
            # 强制指定平台拉取
            docker pull "${image}" --platform "linux/arm64"
            
            # 架构校验：确保拉取到的是 arm64，否则报错停止工作流
            ARCH=$(docker inspect "${image}" --format='{{.Architecture}}')
            echo "Detected architecture: $ARCH"
            
            if [ "$ARCH" != "arm64" ] && [ "$ARCH" != "aarch64" ]; then
              echo "Error: Image $image is $ARCH, NOT arm64! Skipping or failing..."
              exit 1
            fi

            # 文件名处理：替换斜杠和冒号为下划线
            safe_name=$(echo "${image}" | sed 's/[\/:]/_/g')
            
            # 打包并压缩
            docker save "${image}" -o "${safe_name}-arm64.tar"
            gzip -f "${safe_name}-arm64.tar"
            
            echo "Successfully packaged: ${safe_name}-arm64.tar.gz"
          done

      - name: Prepare Release Info
        run: |
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M Build')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV

      # 关键步骤 3：创建 Release 并上传所有压缩包（合并为一个步骤更稳健）
      - name: Create and Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: DockerTarBuilder-ARM64
          name: ${{ env.RELEASE_NAME }} (ARM64)
          body: |
            ### 🛠 自动构建信息
            - **架构**: ARM64 (linux/arm64)
            - **构建时间**: ${{ env.RELEASE_NAME }}
            
            ### 📥 使用方法
            下载后在 ARM 架构机器上执行：
            ```bash
            docker load -i <文件名>.tar.gz
            ```
            
            [![Github](https://img.shields.io/badge/RELEASE-DockerTarBuilder-green?style=for-the-badge)](https://github.com/${{ github.repository }})
          files: |
            *.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
